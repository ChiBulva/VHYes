{% extends "base.html" %}

{% block title %}Edit {{ item.title }} - VHYes{% endblock %}

{% block content %}
<section class="page-heading">
    <div>
        <p class="eyebrow">Edit item</p>
        <h1>{{ item.title }}</h1>
    </div>
    <a class="button" href="{{ url_for('vhyes.detail', item_id=item.id) }}">Back to Item</a>
</section>

<form class="edit-form" method="post" enctype="multipart/form-data">
    <section class="form-main">
        <h2>Media</h2>
        <label>Title<input name="title" required value="{{ item.title or '' }}"></label>
        <div class="split">
            <label>Kind
                <select name="media_kind">
                    {% for kind in ['movie', 'tv', 'book', 'magazine', 'audiobook', 'music', 'game', 'other'] %}
                        <option value="{{ kind }}" {% if item.media_kind == kind %}selected{% endif %}>{{ kind }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>Format
                <select name="format_id">
                    {% for format in formats %}
                        <option value="{{ format.id }}" {% if item.format_id == format.id %}selected{% endif %}>{{ format.name }}</option>
                    {% endfor %}
                </select>
            </label>
        </div>
        <div class="split">
            <label>Year<input name="release_year" inputmode="numeric" value="{{ item.release_year or '' }}"></label>
            <label>Runtime minutes<input name="runtime_minutes" inputmode="numeric" value="{{ item.runtime_minutes or '' }}"></label>
        </div>
        <div class="split">
            <label>Public rating<input name="rating" inputmode="decimal" value="{{ item.rating or '' }}"></label>
            <label>Your rating<input name="personal_rating" inputmode="decimal" value="{{ item.personal_rating or '' }}"></label>
        </div>
        <label>Summary<textarea name="summary" rows="5">{{ item.summary or '' }}</textarea></label>
        <label>Extra info<textarea name="extra_info" rows="4">{{ item.extra_info or '' }}</textarea></label>
    </section>

    <aside class="copy-panel">
        <h2>Copy</h2>
        <label>Barcode<input name="barcode" value="{{ item.barcode or '' }}"></label>
        <label>Edition<input name="edition" value="{{ item.edition or '' }}"></label>
        <label>Shelf location<input name="shelf_location" value="{{ item.shelf_location or '' }}"></label>
        <label>Condition note<input name="condition_note" value="{{ item.condition_note or '' }}"></label>
        <div class="split">
            <label>Purchase price<input name="purchase_price" inputmode="decimal" value="{{ item.purchase_price or '' }}"></label>
            <label>Estimated value<input name="estimated_value" inputmode="decimal" value="{{ item.estimated_value or '' }}"></label>
        </div>
        <label>Acquired date<input name="acquired_at" type="date" value="{{ item.acquired_at or '' }}"></label>
    </aside>

    <section class="form-main">
        <h2>Discovery</h2>
        <label>Mood<input name="mood" value="{{ item.mood or '' }}" placeholder="cozy, tense, weird"></label>
        <label>Mood summary<textarea name="mood_summary" rows="3">{{ item.mood_summary or '' }}</textarea></label>
        <label>Genres<input name="genres" value="{{ genres|join(', ') }}"></label>
        <label>Filter tags<input name="tags" value="{{ tags|map(attribute='name')|join(', ') }}" placeholder="rainy day, family, short, unopened"></label>
        <label>Filter notes<textarea name="filter_notes" rows="3">{{ item.filter_notes or '' }}</textarea></label>
    </section>

    <aside class="copy-panel">
        <h2>Image & Source</h2>
        <label>Upload cover<input name="cover_file" type="file" accept="image/png,image/jpeg,image/webp"></label>
        <label>Image URL<input name="remote_url" value="{{ item.remote_url or '' }}"></label>
        <label>Source name<input name="source_name" value="{{ item.source_name or '' }}"></label>
        <label>Source ID<input name="source_id" value="{{ item.source_id or '' }}"></label>
        <label>Source URL<input name="source_url" value="{{ (external_links[0].url if external_links else item.image_source_url) or '' }}"></label>
        <label>License note<input name="license_note" value="{{ item.license_note or '' }}"></label>
        <input type="hidden" name="raw_payload" value="">
        <button class="button primary full" type="submit">Save Changes</button>
    </aside>
</form>
{% endblock %}
