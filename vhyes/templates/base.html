<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}VHYes{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('vhyes.library') }}">VHYes</a>
        <nav>
            <a href="{{ url_for('vhyes.library') }}">Library</a>
            <a href="{{ url_for('vhyes.browse') }}">Browse</a>
            <a href="{{ url_for('vhyes.add_media') }}">Add Media</a>
            <a href="{{ url_for('vhyes.database_settings') }}">Settings</a>
        </nav>
    </header>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="messages">
                    {% for category, message in messages %}
                        <p class="message {{ category }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
